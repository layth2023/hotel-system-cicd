spring.application.name=HotelSystem

# ==================================================
# = SERVER CONFIG
# ==================================================
server.port=8080

# ==================================================
# = DATABASE CONFIG (MySQL)
# ==================================================
# IMPORTANT: Every developer creates DB locally:
# CREATE DATABASE hotel_db;

spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# ==================================================
# = JPA / HIBERNATE CONFIG
# ==================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ? Disable Open-In-View ( best practice)
spring.jpa.open-in-view=false

# ? Remove explicit dialect (Hibernate will pick it automatically)
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==================================================
# = LOGGING (keep it normal)
# ==================================================
# Your current DEBUG logs are huge. Keep them INFO by default.
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO

# If you want debug sometimes, temporarily switch to:
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ==================================================
# = SWAGGER / OPENAPI
# ==================================================
springdoc.api-docs.path=/v3/api-docs
# ? recommended default swagger ui:
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method

# ==================================================
# = SPRING SECURITY
# ==================================================
# No default in-memory user (you use CustomUserDetailsService)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

