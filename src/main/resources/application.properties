spring.application.name=HotelSystem

# ==================================================
# = SERVER CONFIG
# ==================================================
server.port=8080

# ==================================================
# = DATABASE CONFIG (MySQL)
# ==================================================
# IMPORTANT: Every developer creates DB locally:
# CREATE DATABASE hotel_db;

spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================================================
# = JPA / HIBERNATE CONFIG
# ==================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================================================
# = LOGGING
# ==================================================
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.com.Security=DEBUG

# ==================================================
# = JWT CONFIGURATION
# ==================================================
# IMPORTANT: Change this secret in production!
# Generate a secure key: openssl rand -base64 64
app.jwt.secret=${JWT_SECRET:YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkw}

# Access token expiration: 15 minutes (in milliseconds)
app.jwt.expiration=900000

# Refresh token expiration: 7 days (in milliseconds)
app.jwt.refresh-expiration=604800000

# ==================================================
# = SECURITY CONFIGURATION
# ==================================================
# Maximum failed login attempts before account lockout
app.security.max-failed-attempts=5

# Account lockout duration: 15 minutes (in milliseconds)
app.security.lockout-duration=900000

# ==================================================
# = SWAGGER / OPENAPI
# ==================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ==================================================
# = FILE UPLOAD (for images)
# ==================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==================================================
# = CORS (configure for your frontend URL)
# ==================================================
# app.cors.allowed-origins=http://localhost:3000,http://localhost:4200
